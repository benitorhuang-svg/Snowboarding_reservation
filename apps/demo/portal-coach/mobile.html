<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教練行動視窗 | SkiFun Pro</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --bg-mobile: #0f172a;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-mobile); color: white; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

        header { padding: 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .coach-avatar { width: 50px; height: 50px; border-radius: 18px; border: 2px solid var(--primary); }

        .schedule-card { 
            background: rgba(255,255,255,0.05); border-radius: 32px; padding: 2rem; margin: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }

        .checkin-btn {
            width: 100px; height: 100px; border-radius: 99px; background: var(--primary);
            color: white; border: none; font-weight: 950; font-size: 0.9rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.4); margin: 2rem auto;
            animation: pulse-ring 2s infinite;
        }

        .red-alert {
            position: fixed; inset: 0; background: var(--danger); z-index: 2000;
            display: none; align-items: center; justify-content: center; text-align: center;
            flex-direction: column; padding: 3rem; animation: strobe 0.5s infinite;
        }

        @keyframes strobe { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.7); } 70% { box-shadow: 0 0 0 20px rgba(37,99,235,0); } 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); } }
    </style>
</head>
<body>

    <header>
        <div>
            <div style="font-family:'Outfit'; font-weight:900; font-size:1.4rem;">Coach Yuki</div>
            <div style="font-size:0.75rem; color:#94a3b8; font-weight:800; letter-spacing:1px;">HOKKAIDO_RESORT_V1</div>
        </div>
        <img src="../assets/yuki.png" class="coach-avatar">
    </header>

    <div class="schedule-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
            <span style="font-size:0.7rem; font-weight:950; color:#94a3b8; text-transform:uppercase;">Next Group Session</span>
            <span style="background:#10b981; font-size:0.65rem; padding:4px 10px; border-radius:99px; font-weight:950;">ACTIVE</span>
        </div>
        <div style="font-family:'Outfit'; font-size:2.8rem; font-weight:900; line-height:1;">09:00</div>
        <p style="font-weight:900; font-size:1.1rem; margin-top:0.5rem;">二世谷初階班 (8人)</p>
    </div>

    <button class="checkin-btn" onclick="vibrateCheckIn()">
        <i data-lucide="scan-line" style="width:24px; margin-bottom:4px;"></i>
        簽到
    </button>

    <div style="margin-top:auto; padding:2rem; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
        <button style="background:rgba(255,255,255,0.05); color:white; border:none; padding:1.5rem; border-radius:24px; font-weight:900;" onclick="location.href='profile.html'">教練資歷</button>
        <button style="background:rgba(239, 68, 68, 0.1); color:var(--danger); border:1px solid rgba(239, 68, 68, 0.3); padding:1.5rem; border-radius:24px; font-weight:900;" onclick="triggerEmergency()">緊急救援</button>
    </div>

    <!-- Red Alert Overlay -->
    <div id="alert-bg" class="red-alert">
        <i data-lucide="shield-alert" style="width:120px; height:120px; margin-bottom:2rem;"></i>
        <h1 style="font-size:3rem; font-weight:950; letter-spacing:-2px;">SOS ALERT</h1>
        <p style="font-weight:900; margin-top:1rem; font-size:1.2rem;">正在通知最近的教練與雪場中心...</p>
        <button style="margin-top:4rem; background:white; color:var(--danger); border:none; padding:1rem 3rem; border-radius:99px; font-weight:950;" onclick="cancelEmergency()">CANCEL</button>
    </div>

    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();

        window.vibrateCheckIn = function() {
            if (navigator.vibrate) navigator.vibrate(100);
            alert('名單已更新：學員已全數到達');
        }

        window.triggerEmergency = function() {
            document.getElementById('alert-bg').style.display = 'flex';
        }

        window.cancelEmergency = function() {
            document.getElementById('alert-bg').style.display = 'none';
        }
    </script>
</body>
</html>
