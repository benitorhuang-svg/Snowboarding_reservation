<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教練專業資歷 | SkiFun Coach Identity</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../components.css">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; color: #0f172a; padding: 4rem; }
        .profile-card { background: white; border-radius: 40px; padding: 4rem; border: 1px solid #e2e8f0; max-width: 800px; margin: 0 auto; box-shadow: var(--shadow-deep); }
        .cert-badge { display: flex; align-items: center; gap: 1rem; padding: 1.5rem; border-radius: 20px; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div style="display:flex; align-items:center; gap:2rem; margin-bottom:3.5rem;">
            <div style="width:100px; height:100px; border-radius:32px; background:var(--primary); display:flex; align-items:center; justify-content:center; color:white; font-size:2.5rem; font-weight:950; font-family:'Outfit';">YK</div>
            <div>
                <h1 style="font-size: 2.2rem; font-weight: 950; letter-spacing: -1px;">Coach Yuki</h1>
                <p style="color:#64748b; font-weight:800; font-size:1.1rem;">Professional Snowboard Instructor</p>
            </div>
        </div>

        <h3 style="font-weight:950; margin-bottom:2rem; font-size:1.2rem;">專業證照 (Certifications)</h3>
        
        <div class="cert-badge">
            <i data-lucide="award" style="color:var(--primary); width:32px; height:32px;"></i>
            <div>
                <div style="font-weight:950; font-size:1.1rem;">CASI Snowboard Instructor Level 3</div>
                <div style="font-size:0.8rem; color:#10b981; font-weight:900;">Verified • Active Status</div>
            </div>
        </div>

        <div class="cert-badge" style="opacity:0.6;">
            <i data-lucide="award" style="color:#94a3b8; width:32px; height:32px;"></i>
            <div>
                <div style="font-weight:950; font-size:1.1rem;">SAJ Ski Tech 1st Class</div>
                <div style="font-size:0.8rem; color:#64748b; font-weight:900;">Evaluation Pending</div>
            </div>
        </div>
    </div>
    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();
    </script>
</body>
</html>
