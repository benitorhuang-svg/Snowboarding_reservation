<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統維護中 | SkiFun Japan Maintenance</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #450a0a; color: #fca5a5; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.8) 100%); z-index: 1; }
        .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(239, 68, 68, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(239, 68, 68, 0.1) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; animation: grid-move 20s linear infinite; }
        
        @keyframes grid-move { from { transform: translateY(0); } to { transform: translateY(50px); } }

        .content { position: relative; z-index: 10; text-align: center; padding: 4rem; background: rgba(0,0,0,0.3); backdrop-filter: blur(40px); border-radius: 40px; border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: 0 0 100px rgba(239, 68, 68, 0.2); max-width: 600px; }
        
        .error-code { font-family: 'Outfit'; font-size: 8rem; font-weight: 900; line-height: 1; margin-bottom: 1rem; color: #ef4444; text-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <i data-lucide="zap-off" style="width:64px; height:64px; color:#ef4444; margin-bottom:2rem;"></i>
        <div class="error-code">503</div>
        <h1 style="font-size:2rem; font-weight:950; letter-spacing:-1.5px; margin-bottom:1.5rem; color:white;">SYSTEM RESILIENCE MODE</h1>
        <p style="font-weight:700; color:#fca5a5; line-height:1.6;">系統正在進行核心數據同步。為了確保您的預約安全，目前暫停訪問服務。請於 HOKKAIDO 凌晨 03:00 後重試。</p>
        
        <div style="margin-top:3rem; display:flex; justify-content:center; gap:2rem;">
            <div style="text-align:center;">
                <div style="font-size:0.65rem; font-weight:950; color:#ef4444; text-transform:uppercase;">Encryption</div>
                <div style="font-weight:950; color:white; font-size:0.8rem;">SECURE</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:0.65rem; font-weight:950; color:#ef4444; text-transform:uppercase;">Status</div>
                <div style="font-weight:950; color:white; font-size:0.8rem;">MAINTENANCE</div>
            </div>
        </div>
    </div>

    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();
    </script>
</body>
</html>
