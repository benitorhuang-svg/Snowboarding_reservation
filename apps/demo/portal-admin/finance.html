<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務與支付流水 | SkiFun Finance</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../components.css">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; color: #0f172a; padding: 4rem; }
        .finance-card { background: white; border-radius: 32px; padding: 3rem; border: 1px solid #e2e8f0; max-width: 1200px; margin: 0 auto; box-shadow: 0 10px 50px rgba(15,23,42,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        th { text-align: left; padding: 1.5rem; font-size: 0.75rem; font-weight: 950; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
        td { padding: 1.5rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="finance-card">
        <h2 style="font-size: 1.8rem; font-weight: 950;">財務流水中心 (Finance Ledger)</h2>
        <p style="color:#64748b; font-weight:700;">監控所有 TapPay 交易流水與教練分潤支領狀況。</p>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 3rem;">
            <div style="background:#f8fafc; padding:2rem; border-radius:24px; border:1px solid #e2e8f0;">
                <div style="font-size:0.7rem; font-weight:950; color:#94a3b8; text-transform:uppercase;">本月待支付教練費</div>
                <div style="font-family:'Outfit'; font-size:2.2rem; font-weight:900; color:var(--primary); margin-top:0.5rem;">¥ 154,000</div>
            </div>
            <div style="background:#f8fafc; padding:2rem; border-radius:24px; border:1px solid #e2e8f0;">
                <div style="font-size:0.7rem; font-weight:950; color:#94a3b8; text-transform:uppercase;">平均客單價 (AOV)</div>
                <div style="font-family:'Outfit'; font-size:2.2rem; font-weight:900; color:#10b981; margin-top:0.5rem;">¥ 14,200</div>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>Transaction ID</th><th>User</th><th>Amount</th><th>Status</th></tr>
            </thead>
            <tbody id="finance-table">
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>
    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();
        const state = SkiFunState.get();
        document.getElementById('finance-table').innerHTML = state.finance.transactions.map(t => `
            <tr>
                <td style="font-family:monospace; color:var(--primary); font-weight:900;">${t.id}</td>
                <td>${t.user}</td>
                <td style="font-family:'Outfit'; font-weight:950;">¥ ${t.amount.toLocaleString()}</td>
                <td><span style="background:#dcfce7; color:#166534; padding:4px 12px; border-radius:99px; font-size:0.7rem; font-weight:900;">Successful</span></td>
            </tr>
        `).join('');
    </script>
</body>
</html>
