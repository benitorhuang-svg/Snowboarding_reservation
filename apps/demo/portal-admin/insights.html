<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商業智能分析 | SkiFun Insights</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-body); color: var(--secondary); display: flex; min-height: 100vh; }

        aside { width: 280px; background: var(--secondary); padding: 2.5rem; display: flex; flex-direction: column; gap: 3rem; position: fixed; height: 100vh; color: white; z-index: 100; }
        .logo { display:flex; align-items:center; gap:0.8rem; text-decoration:none; color:white; font-size:1.6rem; font-weight:950; font-family:'Outfit'; }
        
        main { flex-grow: 1; padding: 3rem 4rem; margin-left: 280px; width: 100%; max-width: 1400px; }
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3rem; }
        h1 { font-size: 2.2rem; font-weight: 950; letter-spacing: -1.5px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
        .data-card { background: white; border-radius: 40px; padding: 3rem; border: 1px solid var(--border); box-shadow: var(--shadow-premium); }
    </style>
</head>
<body>

    <aside>
        <div class="logo">
            <div class="logo-icon" style="background:var(--primary); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white;"><i data-lucide="bar-chart-3" style="width:18px;"></i></div>
            <span>SkiFun<span style="color: var(--primary);">Insights</span></span>
        </div>
        <nav style="display: flex; flex-direction: column; gap: 0.8rem;">
            <a href="dashboard.html" style="color: #94a3b8; text-decoration: none; font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem;"><i data-lucide="layout-dashboard" style="width: 18px;"></i> 營運數據總覽</a>
            <a href="#" style="background: rgba(255,255,255,0.05); color: white; text-decoration: none; font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; border-radius: 10px;"><i data-lucide="bar-chart-3" style="width: 18px;"></i> 商業智能分析</a>
        </nav>
    </aside>

    <main>
        <header>
            <div>
                <h1>實時商業智能分析 (BI Insights)</h1>
                <p style="color: #64748b; font-weight: 600; margin-top: 0.5rem;">分析預約趨勢、教練績效表現與全日本雪場的市場占比。</p>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="data-card">
                <h3 style="font-size: 1.1rem; font-weight: 950; margin-bottom: 2rem;">營收增長趨勢</h3>
                <canvas id="mainChart" height="300"></canvas>
            </div>
            <div class="data-card">
                <h3 style="font-size: 1.1rem; font-weight: 950; margin-bottom: 2rem;">即時動態流水 (Live Stream)</h3>
                <div id="activity-list">
                    <!-- Activities -->
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();

        function renderActivities() {
            const list = document.getElementById('activity-list');
            const state = SkiFunState.get();
            list.innerHTML = state.finance.transactions.map(tx => `
                <div style="display:flex; align-items:center; gap:1rem; padding:1.25rem; border-radius:16px; background:#f8fafc; margin-bottom:1rem;">
                    <div style="width:8px; height:8px; border-radius:50%; background:var(--primary);"></div>
                    <div>
                        <div style="font-weight:900; font-size:0.85rem;">${tx.user} 支付成功</div>
                        <div style="font-size:0.7rem; color:#94a3b8; font-weight:700;">¥ ${tx.amount.toLocaleString()} | ${tx.coach}</div>
                    </div>
                </div>
            `).join('');
        }

        renderActivities();
        window.addEventListener('skifun-state-change', renderActivities);

        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: { labels: ['Niseko', 'Hakuba', 'Rusutsu', 'Furano'], datasets: [{ label: '預約數', data: [450, 320, 210, 180], backgroundColor: '#2563eb', borderRadius: 10 }] },
            options: { plugins: { legend: { display:false } } }
        });
    </script>
</body>
</html>
