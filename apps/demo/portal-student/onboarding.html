<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入門引導 | SkiFun Japan Onboarding</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../components.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-body); color: var(--secondary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

        .onboarding-card { background: white; border-radius: 40px; padding: 4rem; width: 100%; max-width: 700px; border: 1px solid var(--border); box-shadow: var(--shadow-deep); }
        
        .step-indicator { display: flex; gap: 0.5rem; margin-bottom: 3rem; }
        .step-dot { flex: 1; height: 6px; border-radius: 10px; background: #e2e8f0; transition: var(--transition); }
        .step-dot.active { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
        .option-card { 
            padding: 2.5rem; border: 2px solid var(--border); border-radius: 24px; text-align: center; 
            cursor: pointer; transition: var(--transition); position: relative; overflow: hidden;
        }
        .option-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .option-card.active { border-color: var(--primary); background: rgba(37,99,235,0.05); }
    </style>
</head>
<body>

    <div class="onboarding-card">
        <div class="step-indicator">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <h1 style="font-size: 2.2rem; font-weight: 950; letter-spacing: -1.5px; margin-bottom: 1rem;">歡迎來到 SkiFun！</h1>
        <p style="color:#64748b; font-weight:700; font-size:1.1rem;">請告訴我們您的滑雪喜好，我們將為您推薦最適合的課程。</p>

        <div class="option-grid">
            <div class="option-card active" onclick="selectOption(this)">
                <i data-lucide="snowboard" style="width:48px; height:48px; color:var(--primary); margin-bottom:1.5rem;"></i>
                <h3 style="font-size:1.4rem; font-weight:950;">Snowboard</h3>
                <p style="font-size:0.8rem; font-weight:800; color:#64748b; margin-top:0.5rem;">單板滑雪</p>
            </div>
            <div class="option-card" onclick="selectOption(this)">
                <i data-lucide="mountain-snow" style="width:48px; height:48px; color:#94a3b8; margin-bottom:1.5rem;"></i>
                <h3 style="font-size:1.4rem; font-weight:950;">Skiing</h3>
                <p style="font-size:0.8rem; font-weight:800; color:#64748b; margin-top:0.5rem;">雙板滑雪</p>
            </div>
        </div>

        <div style="margin-top:4rem; display:flex; justify-content:space-between; align-items:center;">
            <button style="background:transparent; border:none; color:#64748b; font-weight:950; font-size:0.9rem; cursor:pointer;">略過 (Skip)</button>
            <button class="neon-btn" onclick="location.href='booking.html'">下一步 (Step 2)</button>
        </div>
    </div>

    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();

        window.selectOption = function(el) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
