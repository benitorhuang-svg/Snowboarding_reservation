<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份驗證中心 | SkiFun Japan</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../components.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-body); color: var(--secondary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

        .auth-card { background: white; border-radius: 40px; padding: 4rem; width: 100%; max-width: 500px; border: 1px solid var(--border); box-shadow: var(--shadow-deep); text-align: center; }
        
        .logo-box { width: 64px; height: 64px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; margin: 0 auto 2rem; }
        
        .social-btn { 
            width: 100%; padding: 1rem; border-radius: 16px; border: 1px solid var(--border); 
            background: white; display: flex; align-items: center; justify-content: center; 
            gap: 1rem; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: var(--transition);
            margin-bottom: 1rem;
        }
        .social-btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-2px); }

        .divider { display: flex; align-items: center; gap: 1rem; color: #94a3b8; font-size: 0.75rem; font-weight: 950; margin: 2rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

        .input-group { text-align: left; margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 950; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); font-weight: 700; transition: var(--transition); }
        .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

        /* OTP Modal Overlay */
        .otp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .otp-modal { background: white; border-radius: 40px; padding: 3.5rem; width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        .otp-input-group { display: flex; gap: 0.75rem; justify-content: center; margin: 2rem 0; }
        .otp-digit { width: 50px; height: 60px; border: 2px solid #e2e8f0; border-radius: 14px; font-family: 'Outfit'; font-size: 1.5rem; font-weight: 900; text-align: center; color: var(--primary); }
        .otp-digit:focus { border-color: var(--primary); outline: none; background: rgba(37,99,235,0.05); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box"><i data-lucide="mountain" style="width:32px; height:32px;"></i></div>
        <h1 style="font-family:'Outfit'; font-size:2rem; font-weight:950; letter-spacing:-1px;">Unified Gateway</h1>
        <p style="color:#64748b; font-weight:600; margin-top:0.5rem; margin-bottom:3rem;">菁英預約平台身份驗證系統 V2.0</p>

        <div style="margin-bottom: 2rem;">
            <button class="social-btn">
                <img src="https://www.google.com/favicon.ico" style="width:20px;">
                Google 快速登入
            </button>
            <button class="social-btn" onclick="showOTP()">
                <i data-lucide="mail" style="width:20px;"></i>
                社交帳號登入
            </button>
        </div>

        <div class="divider">或使用電子郵件</div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="example@skifun.jp" id="email-in">
        </div>

        <button class="neon-btn" style="width:100%; margin-top:1rem;" onclick="showOTP()">繼續預約流程</button>
        
        <p style="margin-top:2rem; font-size:0.8rem; font-weight:700; color:#64748b;">
            還沒有帳號？ <a href="#" style="color:var(--primary); text-decoration:none;">立即註冊</a>
        </p>
    </div>

    <!-- OTP Modal Component -->
    <div class="otp-overlay" id="otp-view">
        <div class="otp-modal">
            <h2 style="font-family:'Outfit'; font-size:1.8rem; font-weight:950; margin-bottom:1rem;">OTP Verification</h2>
            <p style="font-weight:700; color:#64748b;">驗證碼已發送至您的設備<br><span style="color:var(--primary);" id="target-mail">mika***@gmail.com</span></p>

            <div class="otp-input-group">
                <input type="text" class="otp-digit" maxlength="1" value="8">
                <input type="text" class="otp-digit" maxlength="1" value="2">
                <input type="text" class="otp-digit" maxlength="1" value="4">
                <input type="text" class="otp-digit" maxlength="1" placeholder="-">
                <input type="text" class="otp-digit" maxlength="1" placeholder="-">
                <input type="text" class="otp-digit" maxlength="1" placeholder="-">
            </div>

            <p style="font-size:0.8rem; font-weight:950; color:#94a3b8; margin-bottom:2rem;">
                沒收到驗證碼？ <span style="color:var(--primary); cursor:pointer;" id="countdown">重新發送 (59s)</span>
            </p>

            <button class="neon-btn" style="width:100%;" onclick="location.href='onboarding.html'">驗證成功 (Verify)</button>
        </div>
    </div>

    <script type="module">
        import SkiFunState from '../shared-state.js';
        lucide.createIcons();

        window.showOTP = function() {
            const email = document.getElementById('email-in').value || 'mika***@gmail.com';
            document.getElementById('target-mail').innerText = email;
            document.getElementById('otp-view').style.display = 'flex';
            startTimer();
        }

        function startTimer() {
            let sec = 59;
            const timer = document.getElementById('countdown');
            const itv = setInterval(() => {
                sec--;
                timer.innerText = `重新發送 (${sec}s)`;
                if (sec <= 0) {
                    clearInterval(itv);
                    timer.innerText = '重新發送';
                }
            }, 1000);
        }
    </script>
</body>
</html>
