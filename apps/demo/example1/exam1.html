<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑雪趣 Ski Fun - 原版設計</title>
    <!-- 字體設定 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white w-full h-[72px] flex items-center px-4 md:px-10 justify-between fixed top-0 z-50 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.05)]">
        <!-- Logo & Menu -->
        <div class="flex items-center md:gap-14 gap-4">
            <div class="flex items-center gap-2.5 cursor-pointer">
                <div class="bg-primary rounded flex items-center justify-center w-[34px] h-[34px]">
                    <i data-lucide="search" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-[22px] font-bold text-primary tracking-wide">滑雪趣</span>
            </div>
            
            <div class="hidden md:flex gap-8 text-[15px] font-medium text-gray-500">
                <a href="#" class="text-primary font-bold">首頁</a>
                <a href="#" class="hover:text-primary transition">尋找教練</a>
                <a href="#" class="hover:text-primary transition">雪場介紹</a>
                <a href="#" class="hover:text-primary transition">常見問題</a>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="flex items-center gap-5 md:gap-8">
            <div class="hidden md:flex items-center gap-2 text-gray-500 text-sm font-medium cursor-pointer hover:text-gray-900 transition">
                <i data-lucide="globe" class="w-4 h-4"></i>
                TW / TWD
            </div>
            <a href="#" class="text-gray-600 font-medium text-[15px] hover:text-gray-900 transition">登入</a>
            <button class="bg-secondary hover:bg-[#ea580c] text-white px-7 py-2.5 rounded-full font-medium text-[15px] transition shadow-sm hover:shadow-md">
                註冊
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-[72px] min-h-screen">
        
        <!-- Hero Section -->
        <section class="relative h-[500px] md:h-[560px] flex items-center justify-center">
            <!-- 預設共用圖片，如果 hero.jpg 無法顯示，會出現預設風景照 -->
            <img src="hero.jpg" onerror="this.src='https://images.unsplash.com/photo-1551698618-1dfe5d97d256?q=80&w=2070&auto=format&fit=crop'" class="absolute inset-0 w-full h-full object-cover">
            
            <div class="relative z-10 w-full max-w-7xl mx-auto px-4 md:px-6 text-center">
                <h1 class="text-4xl md:text-[3.25rem] font-bold text-white mb-10 md:mb-14 tracking-wider drop-shadow-lg text-shadow">
                    與資深教練，開啟你的白銀假期
                </h1>
                
                <!-- Search Bar -->
                <div class="hidden md:flex bg-white/30 backdrop-blur-md p-[6px] rounded-[1.25rem] items-center shadow-2xl border border-white/50 w-max mx-auto text-left">
                    <div class="bg-white rounded-l-2xl px-6 py-3.5 flex flex-col justify-center min-w-[200px] border-r border-gray-100 cursor-pointer hover:bg-gray-50 transition">
                        <span class="flex items-center gap-1.5 text-gray-500 text-[11px] font-bold tracking-widest mb-1.5 uppercase">
                            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> 地點 LOCATION
                        </span>
                        <select class="w-full bg-transparent text-gray-900 font-normal text-[15px] outline-none cursor-pointer mt-0.5">
                            <option value="Niseko">Niseko 二世谷</option>
                            <option value="Hakuba">Hakuba 白馬</option>
                            <option value="Rusutsu">Rusutsu 留壽都</option>
                        </select>
                    </div>
                    
                    <div class="bg-white px-6 py-3.5 flex flex-col justify-center min-w-[160px] border-r border-gray-100 cursor-pointer hover:bg-gray-50 transition">
                        <span class="flex items-center gap-1.5 text-gray-500 text-[11px] font-bold tracking-widest mb-1.5 uppercase">
                            <i data-lucide="calendar" class="w-3.5 h-3.5"></i> 日期 DATE
                        </span>
                        <select class="w-full bg-transparent text-gray-900 font-normal text-[15px] outline-none cursor-pointer mt-0.5">
                            <option value="12">12月</option>
                            <option value="1">1月</option>
                            <option value="2">2月</option>
                            <option value="3">3月</option>
                        </select>
                    </div>
                    
                    <div class="bg-white rounded-r-2xl px-6 py-3.5 flex flex-col justify-center min-w-[220px] cursor-pointer hover:bg-gray-50 transition">
                        <span class="flex items-center gap-1.5 text-gray-500 text-[11px] font-bold tracking-widest mb-1.5 uppercase">
                            <i data-lucide="user" class="w-3.5 h-3.5"></i> 程度 SKILL LEVEL
                        </span>
                        <select class="w-full bg-transparent text-gray-900 font-normal text-[15px] outline-none cursor-pointer mt-0.5">
                            <option value="first-time">初次體驗 First-time</option>
                            <option value="beginner">初階 Beginner</option>
                            <option value="intermediate">中階 Intermediate</option>
                            <option value="expert">高階 / 刻滑 Expert</option>
                        </select>
                    </div>
                    
                    <button onclick="window.location.href='../example2/exam2.html'" class="bg-secondary hover:bg-[#ea580c] text-white px-8 py-4 ml-2 my-auto rounded-[0.85rem] font-medium flex items-center gap-2 transition shadow-md whitespace-nowrap active:scale-95">
                        <i data-lucide="search" class="w-[18px] h-[18px]"></i> 尋找課程
                    </button>
                </div>
            </div>
        </section>

        <!-- Coaches Section -->
        <section class="max-w-[1300px] mx-auto px-4 md:px-10 py-16 md:py-24">
            <div class="flex items-end justify-between mb-8">
                <div>
                    <h2 class="text-[26px] font-bold text-gray-900 mb-2">精選教練</h2>
                    <p class="text-gray-500 text-[14px]">為您推薦評價最高、最受歡迎的滑雪教練</p>
                </div>
                <a href="#" class="text-primary text-[14px] font-medium hover:text-blue-700 hover:underline flex items-center transition">
                    查看全部 <span class="ml-1">→</span>
                </a>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="coach-list">
                <!-- 資料列表透過 JS 渲染 -->
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-[#0f172a] pt-16 pb-8 border-t border-slate-800">
        <div class="max-w-[1300px] mx-auto px-8 md:px-10">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12 md:gap-8 mb-16">
                <!-- Brand Info -->
                <div class="col-span-1">
                    <h4 class="text-[20px] font-bold text-white mb-5 tracking-wide">滑雪趣 Ski Fun</h4>
                    <p class="text-gray-400 text-[14px] leading-loose pr-4">
                        為您尋找最專業的滑雪教練，開啟完美的白銀假期。
                    </p>
                </div>
                
                <!-- Explore -->
                <div>
                    <h5 class="text-white text-[15px] font-bold mb-6">探索</h5>
                    <ul class="flex flex-col gap-4 text-[14px] text-gray-400">
                        <li><a href="#" class="hover:text-white transition">所有教練</a></li>
                        <li><a href="#" class="hover:text-white transition">熱門雪場</a></li>
                        <li><a href="#" class="hover:text-white transition">滑雪攻略</a></li>
                    </ul>
                </div>
                
                <!-- Support -->
                <div>
                    <h5 class="text-white text-[15px] font-bold mb-6">服務支援</h5>
                    <ul class="flex flex-col gap-4 text-[14px] text-gray-400">
                        <li><a href="#" class="hover:text-white transition">聯絡我們</a></li>
                        <li><a href="#" class="hover:text-white transition">常見問題 FAQ</a></li>
                        <li><a href="#" class="hover:text-white transition">取消與退款政策</a></li>
                    </ul>
                </div>
                
                <!-- Certifications -->
                <div>
                    <h5 class="text-white text-[15px] font-bold mb-6">安全認證</h5>
                    <div class="flex gap-3">
                        <div class="bg-slate-800 text-gray-300 px-3.5 py-1.5 rounded-md border border-slate-700 text-[13px] font-medium tracking-wide">TapPay</div>
                        <div class="bg-slate-800 text-gray-300 px-3.5 py-1.5 rounded-md border border-slate-700 text-[13px] font-medium tracking-wide">綠界科技</div>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-slate-800 pt-8 text-center text-[13px] text-gray-500 tracking-wide">
                © 2026 滑雪趣 Ski Fun. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        // --- Mock Data ---
        const MOCK_COURSES = [
          {
            id: 1,
            instructor: 'Ken 教練',
            title: '單板 SB 初級 1-4人團體班',
            location: 'Niseko 二世谷',
            rating: 5.0,
            reviews: 50,
            price: 12000,
            languages: ['中', '英', '日', '粵'],
            image: 'ken.jpg',
            avatar: 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80',
            description: '專為從零開始的初學者設計，由資深 Ken 教練親自帶領。課程涵蓋基礎雪感建立、單腳滑行、落葉飄等實用技巧。我們重視安全與樂趣，讓您在輕鬆的氛圍中享受滑雪的快感。'
          },
          {
            id: 2,
            instructor: 'Tun 教練',
            title: '單板 SB 進階刻滑特訓班',
            location: 'Hakuba 白馬',
            rating: 4.8,
            reviews: 32,
            price: 15000,
            languages: ['中', '英'],
            image: 'tun.jpg',
            avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80',
            description: '針對已有基礎的學員，提供進階的刻滑 (Carving) 技巧指導。'
          },
          {
            id: 3,
            instructor: 'Yuki 教練',
            title: '雙板 Ski 兒童專屬啟蒙班',
            location: 'Rusutsu 留壽都',
            rating: 4.9,
            reviews: 88,
            price: 14000,
            languages: ['日', '英'],
            image: 'yuki.png',
            avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80',
            description: '安全的兒童滑雪教學，讓孩子在雪地中快樂學習。'
          },
          {
            id: 4,
            instructor: 'Alex 教練',
            title: '單/雙板 自由滑雪野雪體驗',
            location: 'Niseko 二世谷',
            rating: 5.0,
            reviews: 120,
            price: 18000,
            languages: ['英'],
            image: 'alex.jpg',
            avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80',
            description: '帶您探索未經壓雪的粉雪天堂，需具備高級滑行能力。'
          }
        ];

        function toggleBookmark(e, btn) {
            e.stopPropagation();
            btn.classList.toggle('text-gray-300');
            btn.classList.toggle('text-red-500');
            
            const svg = btn.querySelector('svg');
            if (svg) {
                svg.classList.toggle('fill-current');
            }
        }

        function renderList() {
            const list = document.getElementById('coach-list');
            if(!list) return;
            
            list.innerHTML = MOCK_COURSES.map(c => `
                <div class="bg-white rounded-[1.2rem] overflow-hidden border border-gray-100 shadow-[0_2px_18px_-5px_rgba(0,0,0,0.06)] hover:shadow-lg transition-all duration-300 flex flex-col group cursor-pointer h-full">
                    <div class="relative h-[220px] overflow-hidden">
                        <img src="${c.image}" onerror="this.src='hero.jpg'" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div onclick="toggleBookmark(event, this)" class="absolute top-3 right-3 p-2 bg-white rounded-full shadow-sm text-gray-300 hover:text-red-500 transition-colors z-10 w-[34px] h-[34px] flex items-center justify-center">
                            <i data-lucide="heart" class="w-[18px] h-[18px]"></i>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col grow pb-4">
                        <div class="flex justify-between items-start mb-1.5">
                            <h3 class="text-[17px] font-medium text-gray-900">${c.instructor}</h3>
                            <div class="flex items-center gap-1 text-[13px] font-medium text-gray-600 pt-0.5">
                                <i data-lucide="star" class="w-[14px] h-[14px] fill-[#fbbf24] text-[#fbbf24]"></i> 
                                ${c.rating % 1 === 0 ? c.rating : c.rating.toFixed(1)} 
                                <span class="text-gray-400 font-normal">(${c.reviews})</span>
                            </div>
                        </div>
                        <p class="text-[14px] text-gray-500 mb-4 line-clamp-1">${c.title}</p>
                        
                        <div class="flex items-center gap-1.5 text-[12px] text-gray-400 mb-5">
                            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${c.location} · ${c.languages.join('/')}
                        </div>
                        
                        <div class="border-t border-gray-100 pt-4 mt-auto flex items-baseline">
                            <span class="text-[18px] font-bold text-gray-900">NT$ ${c.price.toLocaleString()}</span>
                            <span class="text-[13px] text-gray-400 ml-1">/ 4小時</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Re-render icons for injected HTML
            if(window.lucide) {
                lucide.createIcons();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) {
                lucide.createIcons();
            }
            renderList();
        });
    </script>
</body>
</html>
