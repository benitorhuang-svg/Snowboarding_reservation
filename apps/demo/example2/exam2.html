<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ж»‘йӣӘ?җз? - Ski Fun Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        /* ?ұи??ҹз??Іи»ёдҪҶд??ҒеҸҜ?Іе? */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .radio-card-input:checked + .radio-card {
            border-color: #2563eb;
            background-color: #eff6ff;
            box-shadow: 0 4px 15px -3px rgba(37, 99, 235, 0.15);

        .radio-card-input:checked + .radio-card .check-icon {
            opacity: 1;

</head>
<body class="text-gray-900 antialiased overflow-x-hidden min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white w-full h-[72px] flex items-center px-4 md:px-10 justify-between sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="flex items-center gap-2.5 cursor-pointer" onclick="window.location.href='../example1/exam1.html'">
            <div class="bg-primary rounded flex items-center justify-center w-[34px] h-[34px]">
                <i data-lucide="snowflake" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-[22px] font-bold text-primary tracking-wide hidden lg:block">ж»‘йӣӘи¶?Booking</span>
        </div>
        
        <!-- Simplified Header Nav -->
        <div class="hidden md:flex items-center gap-12 pl-4">
            <div class="flex flex-col items-center">
                <span class="text-[14px] font-bold text-primary">1. ?ёж??№ж?</span>
                <div class="w-6 h-0.5 bg-primary mt-1 rounded-full"></div>
            </div>
            <span class="text-[14px] font-medium text-gray-300">2. еӯёе“ЎиіҮж?</span>
            <span class="text-[14px] font-medium text-gray-300">3. зўәи?д»ҳж¬ҫ</span>
        </div>

        <a href="../example1/exam1.html" class="text-[14px] font-bold text-gray-500 hover:text-primary flex items-center gap-1.5 transition">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> ?–ж??җз? (иҝ”е?)
        </a>
    </nav>

    <!-- Main Content -->
    <main class="grow max-w-[1100px] w-full mx-auto px-4 md:px-6 py-10 flex flex-col lg:flex-row gap-10">
        
        <!-- Booking Flow (Left) -->
        <div class="w-full lg:w-[65%] flex flex-col gap-8">
            
            <!-- Choose Coach -->
            <section class="bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden">
                <div class="px-6 py-5 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors" onclick="toggleAccordion('coach')">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"><i data-lucide="user-check" class="w-4 h-4"></i></div>
                        <h2 class="text-[18px] font-bold text-gray-900">?ёж??Үе??ҷз·ҙ</h2>
                    </div>
                    <i data-lucide="chevron-up" class="w-5 h-5 text-gray-400 transition-transform duration-300" id="coach-chevron"></i>
                </div>
                
                <div class="px-6 pb-6 transition-all duration-300" id="coach-content">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="coach-selector">
                        <!-- Javascript injected coach radio cards -->
                    </div>
                </div>
            </section>

            <!-- Choose Date & Time -->
            <section id="date-section" class="scroll-mt-24">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-6 h-6 rounded bg-blue-100 text-blue-600 flex items-center justify-center"><i data-lucide="calendar-clock" class="w-4 h-4"></i></div>
                    <h2 class="text-[18px] font-bold text-gray-900">?ёж??Ҙж??Үж?ж®?/h2>
                </div>
                
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-50 flex flex-col md:flex-row gap-8 lg:gap-10">
                    <!-- Mock Calendar -->
                    <div class="w-full md:w-1/2 flex flex-col">
                        <label class="block text-[13px] font-bold text-gray-500 mb-4 uppercase tracking-widest">?ёж? 2026е№?12??/label>
                        <div class="border border-gray-100 rounded-xl overflow-hidden p-6 bg-gray-50/50 grow flex flex-col justify-center">
                            <!-- very simple mock calendar UI -->
                            <div class="grid grid-cols-7 gap-1 text-center text-[12px] font-bold text-gray-400 mb-6">
                                <div>??/div><div>дёҖ</div><div>дә?/div><div>дё?/div><div>??/div><div>дә?/div><div>??/div>
                            </div>
                            <div class="grid grid-cols-7 gap-y-4 gap-x-2 text-center text-[16px] font-medium text-gray-700" id="calendar-grid">
                                <!-- injected -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mock Time Slots -->
                    <div class="w-full md:w-1/2">
                        <label class="block text-[13px] font-bold text-gray-500 mb-4 uppercase tracking-widest">?Ӯж®ө</label>
                        <div class="grid grid-cols-1 gap-3" id="time-slots">
                            <!-- Injected -->
                        </div>
                        <div class="mt-5 p-3 rounded-xl bg-orange-50 border border-orange-100 flex items-start gap-2">
                            <i data-lucide="info" class="w-4 h-4 text-orange-500 shrink-0 mt-0.5"></i>
                            <p class="text-[12px] text-orange-700 font-medium leading-relaxed">?ұй??Ӯж®өе®№ж?е®ўж»ҝпјҢе»әиӯ°жӮЁ?Ўж—©?ёж??ӮеҜҰ?ӣж?иӘІз??Ӣе?д»Ҙж?зөӮд?ж¬ҫзўәиӘҚзӮәжә–гҖ?/p>
                        </div>
                    </div>
                </div>
            </section>
            
        </div>

        <!-- Sticky Summary (Right) -->
        <aside class="w-full lg:w-[35%]">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-[0_8px_30px_-5px_rgba(0,0,0,0.06)] sticky top-28 overflow-hidden flex flex-col">
                <!-- Summary Header -->
                <div class="bg-[#0f172a] px-7 py-5 text-white relative overflow-hidden shrink-0">
                    <div class="absolute -right-10 -top-10 w-40 h-40 bg-primary/40 rounded-full blur-3xl"></div>
                    <div class="relative z-10">
                        <div class="flex items-baseline gap-2 mb-0.5">
                            <h3 class="text-[18px] font-bold">?җз??Һзҙ°</h3>
                            <span id="summary-badge" class="text-primary text-[13px] font-black hidden">В· 0 зӯ?/span>
                        </div>
                        <p class="text-slate-400 text-[12px] tracking-widest uppercase font-bold">Order Summary</p>
                    </div>
                </div>
                
                <!-- Summary Body -->
                <div class="p-7 grow flex flex-col">
                    <div id="summary-content" class="grow">
                        <!-- empty visual when no coach selected -->
                        <div class="text-center py-10 text-gray-400 flex flex-col items-center justify-center gap-3 h-full">
                            <div class="w-16 h-16 rounded-full bg-gray-50 flex items-center justify-center mb-2">
                                <i data-lucide="shopping-cart" class="w-6 h-6 text-gray-300"></i>
                            </div>
                            <span class="text-sm font-medium">е°ҡжңӘе®Ңж??ёж?</span>
                            <span class="text-[12px]">и«Ӣж–је·Ұж–№?ёж??Үе??ҷз·ҙ?Үд?иӘІж??“гҖ?/span>
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-100 mt-6 pt-5 shrink-0">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-gray-500 text-[14px] font-bold">зёҪи??‘й?</span>
                            <span class="text-[26px] font-bold text-gray-900 font-sans tracking-tight" id="summary-total">NT$ 0</span>
                        </div>
                        <p class="text-[11px] text-gray-400 text-right mb-6">?…еҗ«?ёй?зЁ…иІ»дёҰж”Ҝ??TapPay ?җе??Ҳж?зӯүд???/p>
                        
                        <button id="next-btn" class="w-full bg-gray-100 text-gray-400 px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition cursor-not-allowed">
                            дёӢд?жӯҘп?еЎ«еҜ«иіҮж? <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

    </main>

    <script>
        // MOCK data mimicking the previous file using relative images.
        const MOCK_COURSES = [
          {
            id: 1,
            instructor: 'Ken ?ҷз·ҙ',
            title: '?®жқҝ SB ?қз? 1-4дәәе?й«”зҸӯ',
            location: 'Niseko дәҢд?и°?,
            price: 12000,
            image: '../example1/ken.jpg'
          },
          {
            id: 2,
            instructor: 'Tun ?ҷз·ҙ',
            title: '?®жқҝ SB ?Ій??»ж??№и???,
            location: 'Hakuba ?ҪйҰ¬',
            price: 15000,
            image: '../example1/tun.jpg'
          },
          {
            id: 3,
            instructor: 'Yuki ?ҷз·ҙ',
            title: '?ҷжқҝ Ski ?’з«Ҙе°Ҳеұ¬?ҹи???,
            location: 'Rusutsu ?ҷеЈҪ??,
            price: 14000,
            image: '../example1/yuki.png'
          },
          {
            id: 4,
            instructor: 'Alex ?ҷз·ҙ',
            title: '???ҷжқҝ ?Әз”ұж»‘йӣӘ?ҺйӣӘй«”й?',
            location: 'Niseko дәҢд?и°?,
            price: 18000,
            image: '../example1/alex.jpg'
          }
        ];

        let state = {
            current: {
                coachId: null,
                date: null,
                time: null
            },
            items: []
        };

        function renderCoaches() {
            const container = document.getElementById('coach-selector');
            container.innerHTML = MOCK_COURSES.map(c => `
                <label class="block relative cursor-pointer group bg-white">
                    <input type="radio" name="coach" value="${c.id}" class="peer radio-card-input sr-only" onchange="selectCoach(${c.id})">
                    <div class="radio-card p-4 rounded-xl border-2 border-gray-100 flex items-center gap-4 transition-all duration-300 hover:border-blue-200">
                        <img src="${c.image}" onerror="this.src='../example1/hero.jpg'" class="w-16 h-16 rounded-full object-cover">
                        <div class="grow">
                            <h4 class="font-bold text-gray-900 text-[15px] mb-1">${c.instructor}</h4>
                            <p class="text-[12px] text-gray-500 line-clamp-1">${c.title}</p>
                            <p class="text-[14px] font-bold text-gray-900 mt-1">NT$ ${c.price.toLocaleString()}</p>
                        </div>
                        <div class="check-icon w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center opacity-0 scale-50 transition-all absolute top-4 right-4 shadow-sm shadow-blue-500/40">
                            <!-- use raw svg if lucide re-renders too late -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                    </div>
                </label>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            let html = '';
            // offset empty blocks for Dec 2026 (starts on Tuesday)
            html += `<div></div><div></div>`;
            
            for(let i=1; i<=31; i++) {
                // mock some dates as fully booked (e.g., weekends)
                if ([5, 12, 19, 25, 26].includes(i)) {
                    html += `<div class="p-1 aspect-square flex justify-center"><div class="w-full max-w-[44px] h-full flex items-center justify-center rounded-xl text-gray-300 line-through cursor-not-allowed">${i}</div></div>`;
                } else if (i === state.current.date) {
                    html += `<div class="p-1 aspect-square flex justify-center" onclick="selectDate(${i})"><div class="w-full max-w-[44px] h-full flex items-center justify-center rounded-xl bg-primary text-white font-bold cursor-pointer shadow-md shadow-blue-300 transition-all scale-105">${i}</div></div>`;
                } else {
                    html += `<div class="p-1 aspect-square flex justify-center" onclick="selectDate(${i})"><div class="w-full max-w-[44px] h-full flex items-center justify-center rounded-xl hover:bg-blue-50 hover:text-blue-600 font-medium cursor-pointer transition-all">${i}</div></div>`;
                }
            }
            grid.innerHTML = html;
        }

        function renderTimeSlots() {
            const times = ["08:00 - 12:00 (дёҠе???", "13:00 - 17:00 (дёӢе???"];
            const container = document.getElementById('time-slots');
            container.innerHTML = times.map(t => {
                const isSelected = state.current.time === t;
                const activeClass = isSelected ? 'border-primary bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-600 hover:border-blue-200 hover:bg-gray-50';
                return `
                    <div onclick="selectTime('${t}')" class="border-2 rounded-xl px-5 py-3.5 text-[14px] font-bold cursor-pointer transition-all ${activeClass} flex justify-between items-center">
                        ${t}
                        ${isSelected ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                    </div>
                `;
            }).join('');
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id + '-content');
            const chevron = document.getElementById(id + '-chevron');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                chevron.classList.remove('rotate-180');
            } else {
                content.classList.add('hidden');
                chevron.classList.add('rotate-180');
            }
        }

        function selectCoach(id) {
            state.current.coachId = id;
            updateSummary();
            
            // ?ёж??ҷз·ҙеҫҢиҮӘ?•ж”¶?ҲйўЁ?ҙе?пјҢдёҰ?Әе?е№іж?ж»ҫе??ід?дёҖ?Ӣе?еЎ?            const content = document.getElementById('coach-content');
            if (content && !content.classList.contains('hidden')) {
                toggleAccordion('coach');
                setTimeout(() => {
                    document.getElementById('date-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            }
        }

        function selectDate(d) {
            state.current.date = d;
            renderCalendar();
            updateSummary();
        }

        function selectTime(t) {
            state.current.time = t;
            renderTimeSlots();
            updateSummary();
        }

        function addToOrder() {
            if (state.current.coachId && state.current.date && state.current.time) {
                const coach = MOCK_COURSES.find(c => c.id === state.current.coachId);
                state.items.push({
                    ...state.current,
                    id: Date.now(),
                    coachName: coach.instructor,
                    coachImage: coach.image,
                    location: coach.location,
                    title: coach.title,
                    price: coach.price
                });
                
                // ?ҚиЁӯ?®е??ёж?
                state.current = { coachId: null, date: null, time: null };
                
                // ?Қз№Ә UI ?Җ??                document.querySelectorAll('input[name="coach"]').forEach(i => i.checked = false);
                toggleAccordion('coach'); // ?“й?д»Ҙдҫҝ?‘д?дёҖ?Ӣж?з·?                renderCalendar();
                renderTimeSlots();
                updateSummary();
                
                // ?Іе??һй??Ёж?дёӢд??Ӣж?з·?                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function removeItem(id) {
            state.items = state.items.filter(item => item.id !== id);
            updateSummary();
        }

        function renderSummaryItem(item, isDraft = false) {
            return `
                <div class="${isDraft ? 'border-2 border-dashed border-gray-100 bg-gray-50/20' : 'bg-white border border-gray-100 shadow-sm'} rounded-xl p-4 relative group transition-all overflow-hidden">
                    ${!isDraft ? `
                        <button onclick="removeItem(${item.id})" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-lg z-10">
                            <i data-lucide="x" class="w-3 h-3 text-white"></i>
                        </button>
                    ` : ''}
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-11 h-11 rounded-lg overflow-hidden shrink-0 border border-gray-100 bg-white" style="width: 44px; height: 44px;">
                            ${item.coachImage ? `<img src="${item.coachImage}" class="w-full h-full object-cover ${isDraft ? 'opacity-40' : ''}" style="width: 100%; height: 100%; object-fit: cover;">` : '<div class="w-full h-full flex items-center justify-center bg-gray-50 text-gray-200"><i data-lucide="user" class="w-5 h-5"></i></div>'}
                        </div>
                        <div class="grow min-w-0">
                            <div class="flex items-center gap-2 mb-0.5">
                                <h4 class="font-bold ${isDraft && !item.coachName ? 'text-gray-300 italic' : 'text-gray-800'} text-[14px] truncate shrink-0">${item.coachName || 'е°ҡжңӘ?ёж??ҷз·ҙ'}</h4>
                                <span class="text-[11px] text-gray-400 truncate">${item.title || ''}</span>
                            </div>
                            <p class="text-[10px] font-black text-primary/60 uppercase tracking-widest truncate">${item.location || 'еҫ…зўәиӘ?}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-2 text-[12px] text-gray-400 bg-gray-50/50 rounded-lg p-2.5">
                        <div class="flex items-center gap-1.5 border-b border-gray-200/50 pb-1.5">
                            <i data-lucide="calendar" class="w-3.5 h-3.5 opacity-60"></i>
                            <span class="${isDraft && !item.date ? 'text-gray-300' : 'text-gray-700 font-bold'} text-[11px]">2026 / 12 / ${item.date || '--'}</span>
                        </div>
                        <div class="flex items-center gap-1.5 min-w-0">
                            <i data-lucide="clock" class="w-3.5 h-3.5 opacity-60"></i>
                            <span class="${isDraft && !item.time ? 'text-gray-300' : 'text-gray-700 font-bold'} text-[11px] truncate">${item.time || '--'}</span>
                        </div>
                    </div>
                    ${isDraft ? `
                        <button onclick="addToOrder()" class="w-full mt-4 py-3 rounded-xl text-[13px] font-black transition-all flex items-center justify-center gap-2
                            ${(state.current.coachId && state.current.date && state.current.time) ? 'bg-primary text-white shadow-md hover:translate-y-[-1px]' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}">
                            зўәи?дёҰе??ҘжӯӨ?Ӯж®ө
                        </button>
                    ` : ''}
                </div>
            `;
        }

        function updateSummary() {
            const dest = document.getElementById('summary-content');
            const totalDest = document.getElementById('summary-total');
            const nextBtn = document.getElementById('next-btn');
            const badge = document.getElementById('summary-badge');

            // ?ҙж–°?ёй?еҫҪз?
            if (state.items.length > 0) {
                badge.innerText = `В· ${state.items.length} зӯҶ`;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            if (state.items.length === 0 && !state.current.coachId && !state.current.date && !state.current.time) {
                dest.innerHTML = `
                    <div class="text-center py-10 text-gray-400 flex flex-col items-center justify-center gap-3 h-full">
                        <div class="w-16 h-16 rounded-full bg-gray-50 flex items-center justify-center mb-2">
                            <i data-lucide="shopping-cart" class="w-6 h-6 text-gray-300"></i>
                        </div>
                        <span class="text-sm font-medium">е°ҡжңӘе®Ңж??ёж?</span>
                        <span class="text-[12px]">и«Ӣж–је·Ұж–№?ёж??Үе??ҷз·ҙ?Үд?иӘІж??“гҖ?/span>
                    </div>
                `;
                totalDest.innerHTML = "NT$ 0";
                nextBtn.disabled = true;
                nextBtn.className = "w-full bg-gray-100 text-gray-400 px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition cursor-not-allowed";
                nextBtn.innerHTML = `и«Ӣе??җйҒё?…д»Ҙз№јз?`;
                if(window.lucide) lucide.createIcons();
                return;
            }

            let html = '<div class="flex flex-col gap-4">';
            
            // е·ІйҒёиЎҢз?
            state.items.forEach(item => {
                html += renderSummaryItem(item, false);
            });

            // иҰҸе?дёӯи?зЁ?            if (state.current.coachId || state.current.date || state.current.time) {
                const c = MOCK_COURSES.find(x => x.id === state.current.coachId);
                const draftItem = {
                    ...state.current,
                    coachName: c?.instructor,
                    coachImage: c?.image,
                    location: c?.location
                };
                html += renderSummaryItem(draftItem, true);
            }

            html += '</div>';
            dest.innerHTML = html;

            const total = state.items.reduce((sum, item) => sum + item.price, 0);
            totalDest.innerHTML = `NT$ ${total.toLocaleString()}`;

            if (state.items.length > 0) {
                nextBtn.disabled = false;
                nextBtn.className = "w-full bg-secondary hover:bg-[#ea580c] text-white px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-orange-500/20 transition-all transform hover:-translate-y-0.5";
                nextBtn.innerHTML = `дёӢд?жӯҘп??Іе…Ҙзөҗеёі <i data-lucide="arrow-right" class="w-5 h-5"></i>`;
            } else {
                nextBtn.disabled = true;
                nextBtn.className = "w-full bg-gray-100 text-gray-400 px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition cursor-not-allowed";
                nextBtn.innerHTML = `и«Ӣе?? е…ҘиЎҢз?`;
            }
            
            if(window.lucide) lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCoaches();
            renderCalendar();
            renderTimeSlots();
            if(window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
